<div class="mt-4 div-page">
    <div class="page-header-1">
        <h2><i class="fas fa-calendar-check"></i> Liste des rendez-vous</h2>
    </div>
    <div class="filtre-toolbar">
        <div class="filtre-filters">
            <div class="search-bar input-group">
                <input type="search" class="form-control" placeholder="Rechercher par patient, notes ou statut..."
                    [(ngModel)]="searchTerm" (input)="onSearchInput($event)" (keyup.enter)="onSearch()">
                <button class="btn btn-outline-secondary" type="button" (click)="onSearch()">
                    Rechercher
                </button>
            </div>
            <div class="filter-field">
                <select class="form-select" id="patientFilter" [(ngModel)]="selectedPatientId"
                    (change)="filtrerByPatient(selectedPatientId)">
                    <option value="">Tous les patients</option>

                    @for (patient of patients; track patient.id) {
                    <option [value]="patient.id">
                        {{ patient.fullName }}
                    </option>
                    }
                </select>
            </div>
        </div>
        <div class="filtre-actions">
            <button (click)="goToNewAppointment()" class="btn btn-primary">
                <i class="fas fa-plus"></i> Nouveau rendez-vous
            </button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Patient</th>
                    <th>Date de rendez-vous</th>
                    <th>Statut</th>
                    <th>Notes</th>
                    <th class="text-end"></th>
                </tr>
            </thead>
            <tbody>
                <tr appTableLoading [loading]="loading" [colspan]="5"></tr>
                @if (!loading) {
                @for (item of appointments; track item.id) {
                <tr>
                    <td class="fw-bold">{{ item.patient.fullName }}</td>
                    <td>{{ item.appointmentDate }}</td>
                    <td>
                        <span class="status-badge" [ngClass]="getStatusClass(item.status)">
                            {{ getStatusLabel(item.status) }}
                        </span>
                    </td>
                    <td>{{ item.notes }}</td>
                    <td class="text-end">
                        <button class="btn btn-outline-warning btn-sm me-2" title="Modifier"
                            (click)="editAppointment(item.id)">
                            <i class="fa-regular fa-pen-to-square"></i>
                        </button>
                        <button class="btn btn-outline-danger btn-sm" title="Supprimer"
                            (click)="deleteAppointment(item.id)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="5" class="text-center text-muted py-4">Aucun rendez-vous trouvé</td>
                </tr>
                }
                }
            </tbody>
        </table>
    </div>
    <app-pagination [page]="page" (pageChange)="onPageChange($event)"></app-pagination>
</div>
