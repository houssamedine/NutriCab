spring:
  datasource:
    url: jdbc:h2:mem:nutricab_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

app:
  security:
    auth:
      login-checks-enabled: true
      authorization-checks-enabled: true
    cors:
      allowed-origins: http://localhost:4200
    cookies:
      secure: false
      same-site: Lax
    jwt:
      issuer: patients-md-test
      secret: test_NutriCab_JWT_Secret_Key_2026_123456789
      expiration-minutes: 15
      refresh-expiration-days: 1

logging:
  level:
    com.bd.patientsmd: INFO
    org.hibernate.SQL: WARN
