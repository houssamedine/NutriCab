spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

app:
  security:
    auth:
      login-checks-enabled: true
      authorization-checks-enabled: true
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
    cookies:
      secure: true
      same-site: Strict
    jwt:
      issuer: ${JWT_ISSUER:patients-md}
      secret: ${JWT_SECRET}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
      refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}

logging:
  level:
    com.bd.patientsmd: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
